<div class="page" id="page-projects">
  <div class="topbar">
    <div><div class="tb-title">Projects</div><div class="tb-sub">Active project workstreams grouped by client</div></div>
    <div class="tb-right">
      <div class="sync-badge"><span class="sync-dot"></span><span id="projSyncLabel">Synced</span></div>
      <button class="icon-btn" onclick="refreshProjects()"><i class="ti ti-refresh"></i></button>
      <button class="icon-btn"><i class="ti ti-bell"></i></button>
      <button class="btn-new" data-role="admin" onclick="openNewProjectModal()"><i class="ti ti-plus"></i>New</button>
    </div>
  </div>
  <div class="toolbar">
    <div class="search-wrap"><i class="ti ti-search"></i><input class="search-input" id="projSearch" type="text" placeholder="Search workstreams or clients…" oninput="renderProjects()"></div>
    <div class="sel-wrap"><select class="filter-sel" id="projSvcFilter" onchange="renderProjects()">
      <option value="">All services</option>
      <option>Trucking</option><option>Warehousing</option><option>Technology</option><option>Advisory</option><option>Distribution</option><option>Other</option>
    </select></div>
    <div class="sel-wrap"><select class="filter-sel" id="projStatusFilter" onchange="renderProjects()">
      <option value="">All statuses</option>
      <option>On Track</option><option>Waiting</option><option>Blocked</option><option>Completed</option>
    </select></div>
    <div class="sel-wrap"><select class="filter-sel" id="projDeadlineFilter" onchange="renderProjects()">
      <option value="">All deadlines</option>
      <option value="7">Next 7 days</option><option value="14">Next 14 days</option><option value="30">Next 30 days</option>
    </select></div>
    <div class="item-count" id="projCount">0 items</div>
  </div>
  <div class="page-body" id="projBody"></div>
</div>

<script>
var _projModal = null; // current modal item

function renderProjects() {
  var search  = (document.getElementById('projSearch').value || '').toLowerCase();
  var svc     = document.getElementById('projSvcFilter').value;
  var status  = document.getElementById('projStatusFilter').value;
  var dlDays  = parseInt(document.getElementById('projDeadlineFilter').value) || 0;
  var today   = new Date(); today.setHours(0,0,0,0);

  var items = state.projects.filter(function(p) {
    if (search && !p.client.toLowerCase().includes(search) && !p.workstream.toLowerCase().includes(search)) return false;
    if (svc    && p.service !== svc)    return false;
    if (status && p.status  !== status) return false;
    if (dlDays) {
      var d = new Date(p.deadline); d.setHours(0,0,0,0);
      var diff = Math.round((d - today) / 86400000);
      if (diff < 0 || diff > dlDays) return false;
    }
    return true;
  });

  document.getElementById('projCount').textContent = items.length + ' item' + (items.length !== 1 ? 's' : '');

  var groups = state.groupByClient(items);
  var body   = document.getElementById('projBody');

  if (!groups.length) { body.innerHTML = '<div style="color:var(--muted);padding:20px 0;font-size:12px;">No projects match the current filters.</div>'; return; }

  body.innerHTML = groups.map(function(g) {
    var onTrack  = g.items.filter(function(x){ return x.status==='On Track'; }).length;
    var waiting  = g.items.filter(function(x){ return x.status==='Waiting'; }).length;
    var blocked  = g.items.filter(function(x){ return x.status==='Blocked'; }).length;
    var totalRev = g.items.reduce(function(s,x){ return s + (x.estRevenue||0); }, 0);
    var initials = g.client.replace(/[^A-Z]/g,'').slice(0,2) || g.client.slice(0,2).toUpperCase();
    var pillHtml = [
      blocked  ? '<span class="pill pill-blocked"><span class="pill-dot"></span>'+blocked+' blocked</span>'  : '',
      waiting  ? '<span class="pill pill-waiting"><span class="pill-dot"></span>'+waiting+' waiting</span>'  : '',
      onTrack  ? '<span class="pill pill-ontrack"><span class="pill-dot"></span>'+onTrack+' on track</span>' : '',
    ].filter(Boolean).join('');

    var rows = g.items.map(function(p) {
      var dlHtml = p.deadline
        ? '<div class="dl-wrap"><span class="dl-date">' + utils.shortDate(p.deadline) + '</span>' + utils.deadlineDelta(p.deadline) + '</div>'
        : '<span class="td-muted">—</span>';
      var rowCls = p.status === 'Blocked' ? ' class="row-blocked"' : '';
      return '<tr' + rowCls + ' onclick="openProjectModal(\'' + p.id + '\')">'
        + '<td><div class="td-primary">' + p.workstream + '</div><div class="td-id">' + p.id + '</div></td>'
        + '<td>' + utils.svcBadge(p.service) + '</td>'
        + '<td class="td-muted">' + p.owner + '</td>'
        + '<td>' + utils.statusPill(p.status) + '</td>'
        + '<td class="td-wrap">' + (p.thisWeek || '—') + '</td>'
        + '<td class="td-rev">' + (p.estRevenue ? utils.formatIDR(p.estRevenue) : '<span class="td-muted">—</span>') + '</td>'
        + '<td>' + dlHtml + '</td>'
        + '<td class="td-arr"><i class="ti ti-chevron-right"></i></td>'
        + '</tr>';
    }).join('');

    return '<div class="client-group">'
      + '<div class="client-hdr" onclick="toggleGroup(this)">'
      + '<i class="ti ti-chevron-down client-chev"></i>'
      + '<div class="client-av" style="background:rgba(0,180,216,.12);color:var(--cyan);">' + initials + '</div>'
      + '<div><div class="client-name">' + g.client + '</div><div class="client-sub">' + g.items.length + ' WORKSTREAM' + (g.items.length!==1?'S':'') + '</div></div>'
      + '<div class="client-pills">' + pillHtml + '</div>'
      + (totalRev ? '<div class="client-rev"><div class="cr-label">Est Rev</div><div class="cr-val">' + utils.formatIDR(totalRev) + '</div></div>' : '')
      + '</div>'
      + '<table class="data-table">'
      + '<thead><tr><th>Workstream</th><th>Service</th><th>Owner</th><th>Status</th><th>This Week</th><th>Est. Rev</th><th>Deadline</th><th></th></tr></thead>'
      + '<tbody>' + rows + '</tbody>'
      + '</table></div>';
  }).join('');

  document.getElementById('projSyncLabel').textContent = 'Synced · ' + new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) + ' WIB';
}

function openProjectModal(id) {
  var p = state.getById(id);
  if (!p) return;
  _projModal = p;
  locks.open(id);
  document.getElementById('mTitle').textContent = p.workstream;
  document.getElementById('mMeta').textContent  = p.id + ' · ' + p.client + ' · ' + p.service;
  document.getElementById('mOwner').textContent = p.owner;
  document.getElementById('mStatus').innerHTML  = utils.statusPill(p.status);
  document.getElementById('mRev').textContent   = utils.formatIDR(p.estRevenue);
  document.getElementById('mDeadline').textContent = utils.formatDate(p.deadline);
  document.getElementById('mThisWeek').value     = p.thisWeek  || '';
  document.getElementById('mLastWeek').value     = p.lastWeek  || '';
  document.getElementById('mBtnDelete').style.display = auth.isMasterAdmin() ? '' : 'none';
  document.getElementById('mBtnDelete').onclick  = function(){ deleteProject(id, p.client, p.workstream); };
  document.getElementById('mBtnEdit').onclick    = function(){ saveProject(p); };
  document.getElementById('detailModal').classList.add('open');
}

function saveProject(p) {
  var payload = {
    id:         p.id,
    entity:     'project',
    client:     p.client,
    workstream: p.workstream,
    service:    p.service,
    status:     p.status,
    thisWeek:   document.getElementById('mThisWeek').value,
    deadline:   p.deadline,
    estRevenue: p.estRevenue,
    updated:    p.updated,
  };
  api.sync('project', payload, function(data) {
    if (data.success) {
      closeModal(); state.refresh(function(){ renderProjects(); renderDashboard(); });
      utils.toast('Saved.', 'success');
    } else if (data.conflict) {
      locks.storeConflict('project', payload);
    } else {
      utils.toast(data.error || 'Save failed.', 'error');
    }
  });
}

function deleteProject(id, client, ws) {
  if (!confirm('Delete "' + ws + '"? This cannot be undone.')) return;
  api.delete('project', id, function(data) {
    if (data.success) {
      closeModal(); state.refresh(function(){ renderProjects(); renderDashboard(); });
      utils.toast('Deleted.', 'success');
    } else {
      utils.toast(data.error || 'Delete failed.', 'error');
    }
  });
}

function openNewProjectModal() { utils.toast('New project form — connect to sync endpoint.', 'success'); }
function refreshProjects() { state.refresh(function(){ renderProjects(); utils.toast('Refreshed.','success'); }); }

function closeModal() {
  document.getElementById('detailModal').classList.remove('open');
  _projModal = null;
}
</script>
