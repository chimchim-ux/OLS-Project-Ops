<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OLS Work Hub</title>
  
  <!-- Design Tokens (Main Blueprint §14) -->
  <style>
    :root {
      --bg: #0A0A0A;
      --surface: #141414;
      --surface-2: #1A1A1A;
      --border-default: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.14);
      --accent: #00B4D8;
      --accent-dim: rgba(0,180,216,0.45);
      --accent-ghost: rgba(0,180,216,0.12);
      --green: #8BC34A;
      --amber: #FFA726;
      --red: #E05252;
      --slate-blue: #7A9BB5;
      --text-primary: #FFFFFF;
      --text-muted: rgba(255,255,255,0.38);
      --text-muted-2: rgba(255,255,255,0.22);
      --radius-card: 10px;
      --radius-input: 8px;
      --radius-pill: 5px;
      --radius-tile: 8px;
      --font-main: 'Segoe UI', system-ui, Arial, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: var(--font-main);
      background: var(--bg);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Layout Shell */
    #app-container {
      display: none; /* Toggled on successful auth */
      height: 100vh;
      flex-direction: row;
    }
    #app-container.active { display: flex; }

    /* Sidebar (Main Blueprint §13) */
    #sidebar {
      width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border-default);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      flex-shrink: 0;
    }
    .sidebar-brand {
      padding: 0 20px 20px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--accent);
      border-bottom: 1px solid var(--border-default);
      margin-bottom: 8px;
    }
    .nav-group { margin-top: 16px; }
    .nav-group-title {
      padding: 0 20px 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-muted);
    }
    .nav-item {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 14px;
      transition: background 0.15s, color 0.15s;
      border-left: 3px solid transparent;
    }
    .nav-item:hover { background: var(--surface-2); color: var(--text-primary); }
    .nav-item.active {
      background: var(--accent-ghost);
      color: var(--accent);
      border-left-color: var(--accent);
    }
    .nav-item[hidden] { display: none; }

    /* Main Content Mount */
    #main-content {
      flex: 1;
      background: var(--bg);
      overflow-y: auto;
      padding: 28px 32px;
      position: relative;
    }
    .page-view { display: none; width: 100%; }
    .page-view.active { display: block; animation: fadeIn 0.2s ease-out; }

    /* Login Overlay */
    #login-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    #login-overlay[hidden] { display: none; }

    /* Utilities */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
  </style>
</head>

<body>
  <!-- Login Screen -->
  <div id="login-overlay">
    <?!= include('pages/login'); ?>
  </div>

  <!-- App Shell -->
  <div id="app-container">
    <aside id="sidebar">
      <div class="sidebar-brand">OLS Work Hub</div>
      
      <div class="nav-group">
        <div class="nav-group-title">Main</div>
        <div class="nav-item active" data-page="dashboard">Dashboard</div>
      </div>

      <div class="nav-group">
        <div class="nav-group-title">Workstreams</div>
        <div class="nav-item" data-page="projects">Projects</div>
        <div class="nav-item" data-page="operations">Operations</div>
        <div class="nav-item" data-page="tenders">Tenders</div>
      </div>

      <div class="nav-group">
        <div class="nav-group-title">Tools</div>
        <div class="nav-item" data-page="report">Weekly Report</div>
        <div class="nav-item" data-page="history">History</div>
      </div>

      <div class="nav-group">
        <div class="nav-group-title">Admin</div>
        <div class="nav-item" data-page="settings" data-role="masterAdmin">Settings</div>
      </div>
    </aside>

    <main id="main-content">
      <!-- Dashboard & Sub-components -->
      <div id="dashboard" class="page-view active">
        <?!= include('pages/dashboard'); ?>
        <?!= include('pages/revenue'); ?>
        <?!= include('pages/focus'); ?>
      </div>

      <!-- Workstreams -->
      <div id="projects" class="page-view"><?!= include('pages/projects'); ?></div>
      <div id="operations" class="page-view"><?!= include('pages/operations'); ?></div>
      <div id="tenders" class="page-view"><?!= include('pages/tenders'); ?></div>

      <!-- Tools & Admin -->
      <div id="report" class="page-view"><?!= include('pages/report'); ?></div>
      <div id="history" class="page-view"><?!= include('pages/history'); ?></div>
      <div id="settings" class="page-view"><?!= include('pages/settings'); ?></div>
    </main>
  </div>

  <!-- JS Modules (File Structure Blueprint §4) -->
  <?!= include('js/state'); ?>
  <?!= include('js/api'); ?>
  <?!= include('js/auth'); ?>
  <?!= include('js/utils'); ?>
  <?!= include('js/locks'); ?>

  <!-- Shell Routing & Session Logic -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const overlay = document.getElementById('login-overlay');
      const app = document.getElementById('app-container');
      const navItems = document.querySelectorAll('.nav-item');
      const pageViews = document.querySelectorAll('.page-view');

      // 1. Session Check on Load
      const session = auth.getSession();
      if (session && session.role) {
        bootApp(session);
      } else {
        overlay.removeAttribute('hidden');
      }

      // 2. Sidebar Navigation Handler
      navItems.forEach(item => {
        item.addEventListener('click', () => {
          if (item.hasAttribute('hidden')) return;
          const target = item.dataset.page;
          
          // Update Nav State
          navItems.forEach(n => n.classList.remove('active'));
          item.classList.add('active');

          // Switch View
          pageViews.forEach(p => p.classList.remove('active'));
          const targetView = document.getElementById(target);
          if (targetView) {
            targetView.classList.add('active');
            // Trigger page-specific render hooks if defined
            if (typeof window[`onNavigate_${target}`] === 'function') {
              window[`onNavigate_${target}`]();
            }
          }
        });
      });

      // 3. Public Router for external triggers (e.g., post-login redirect)
      window.appShell = {
        showApp: (sessionData) => bootApp(sessionData),
        navigateTo: (pageId) => {
          const nav = document.querySelector(`.nav-item[data-page="${pageId}"]`);
          if (nav && !nav.hasAttribute('hidden')) nav.click();
        }
      };

      function bootApp(session) {
        overlay.setAttribute('hidden', '');
        app.classList.add('active');
        applyRoleGating(session.role);
        
        // Initial data load (Blueprint §11)
        api.getData().then(response => {
          state.load(response);
          if (typeof window.onNavigate_dashboard === 'function') window.onNavigate_dashboard();
        }).catch(err => console.error('Data load failed:', err));
      }

      function applyRoleGating(role) {
        document.querySelectorAll('[data-role]').forEach(el => {
          if (role === el.dataset.role) el.removeAttribute('hidden');
          else el.setAttribute('hidden', '');
        });
      }
    });
  </script>
</body>
</html>
