<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OLS Work Hub</title>
  
  <style>
    :root {
      --bg: #0A0A0A;
      --surface: #141414;
      --surface-2: #1A1A1A;
      --border-default: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.14);
      --accent: #00B4D8;
      --accent-dim: rgba(0,180,216,0.45);
      --accent-ghost: rgba(0,180,216,0.12);
      --green: #8BC34A;
      --amber: #FFA726;
      --red: #E05252;
      --text-primary: #FFFFFF;
      --text-muted: rgba(255,255,255,0.38);
      --font-main: 'Segoe UI', system-ui, Arial, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: var(--font-main);
      background: var(--bg);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #app-container { display: none; height: 100vh; flex-direction: row; }
    #app-container.active { display: flex; }

    /* Sidebar */
    #sidebar {
      width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border-default);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      flex-shrink: 0;
    }
    .sidebar-brand {
      padding: 0 20px 20px;
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      border-bottom: 1px solid var(--border-default);
    }
    .nav-group { margin-top: 16px; flex-grow: 1; }
    .nav-group-title {
      padding: 0 20px 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 1px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 14px;
      border-left: 3px solid transparent;
      transition: all 0.2s;
    }
    .nav-item:hover { background: var(--surface-2); color: var(--text-primary); }
    .nav-item.active {
      background: var(--accent-ghost);
      color: var(--accent);
      border-left-color: var(--accent);
    }
    .sidebar-footer {
      padding: 16px 20px;
      font-size: 10px;
      color: var(--text-muted);
      border-top: 1px solid var(--border-default);
    }

    /* Main Content */
    #main-content {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
    }
    .page-view { display: none; }
    .page-view.active { display: block; animation: fadeIn 0.2s ease-out; }

    /* Login Overlay */
    #login-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 10000;
    }
    #login-overlay[hidden] { display: none !important; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

<body>
  <div id="login-overlay" hidden>
    <?!= include('pages/login'); ?>
  </div>

  <div id="app-container">
    <aside id="sidebar">
      <div class="sidebar-brand">OLS Work Hub</div>
      
      <div class="nav-group">
        <div class="nav-group-title">Main</div>
        <div class="nav-item active" data-page="dashboard">Dashboard</div>

        <div class="nav-group-title" style="margin-top:16px;">Workstreams</div>
        <div class="nav-item" data-page="projects">Projects</div>
        <div class="nav-item" data-page="operations">Operations</div>
        <div class="nav-item" data-page="tenders">Tenders</div>

        <div class="nav-group-title" style="margin-top:16px;">Tools</div>
        <div class="nav-item" data-page="report">Weekly Report</div>
        <div class="nav-item" data-page="history">History</div>
        
        <div id="admin-nav" data-role="masterAdmin" hidden>
           <div class="nav-group-title" style="margin-top:16px;">Admin</div>
           <div class="nav-item" data-page="settings">Settings</div>
        </div>
      </div>

      <div class="sidebar-footer">
        OLS Work Hub v2.0.0
      </div>
    </aside>

    <main id="main-content">
      <div id="dashboard" class="page-view active">
        <?!= include('pages/dashboard'); ?>
        <?!= include('pages/revenue'); ?>
        <?!= include('pages/focus'); ?>
      </div>
      <div id="projects" class="page-view"><?!= include('pages/projects'); ?></div>
      <div id="operations" class="page-view"><?!= include('pages/operations'); ?></div>
      <div id="tenders" class="page-view"><?!= include('pages/tenders'); ?></div>
      <div id="report" class="page-view"><?!= include('pages/report'); ?></div>
      <div id="history" class="page-view"><?!= include('pages/history'); ?></div>
      <div id="settings" class="page-view"><?!= include('pages/settings'); ?></div>
    </main>
  </div>

  <?!= include('js/state'); ?>
  <?!= include('js/api'); ?>
  <?!= include('js/auth'); ?>
  <?!= include('js/utils'); ?>
  <?!= include('js/locks'); ?>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const overlay = document.getElementById('login-overlay');
      const app = document.getElementById('app-container');
      const navItems = document.querySelectorAll('.nav-item');
      const pageViews = document.querySelectorAll('.page-view');

      // 1. Initial Auth Check
      const session = auth.getSession();
      if (session && session.valid) {
        bootApp(session);
      } else {
        overlay.removeAttribute('hidden');
      }

      // 2. Navigation Handler
      navItems.forEach(item => {
        item.addEventListener('click', () => {
          const target = item.dataset.page;
          
          navItems.forEach(n => n.classList.remove('active'));
          item.classList.add('active');

          pageViews.forEach(p => p.classList.remove('active'));
          const targetView = document.getElementById(target);
          if (targetView) targetView.classList.add('active');

          // Trigger Render Hooks (important for Dashboard/Charts)
          if (typeof window[`render_${target}`] === 'function') {
            window[`render_${target}`]();
          }
        });
      });

      // 3. Global Boot Sequence
      function bootApp(sessionData) {
        overlay.setAttribute('hidden', 'true');
        app.classList.add('active');
        
        // Handle Role Visibility
        if (sessionData.role === 'masterAdmin') {
          document.getElementById('admin-nav').removeAttribute('hidden');
        }

        // Load Global Data
        api.getData().then(res => {
          if (res.success) {
            state.load(res);
            // Default render
            if (typeof window.render_dashboard === 'function') window.render_dashboard();
          } else {
            utils.toast('Failed to load data', 'error');
          }
        });
      }

      // Expose bootApp to window for login.html to call
      window.bootApp = bootApp;
    });
  </script>
</body>
</html>
